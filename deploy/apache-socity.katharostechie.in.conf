# Reference Apache vhost for socity.katharostechie.in
# deploy.sh writes an equivalent file to /etc/apache2/sites-available/

<VirtualHost *:80>
    ServerName socity.katharostechie.in

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/socity-error.log
    CustomLog ${APACHE_LOG_DIR}/socity-access.log combined
</VirtualHost>

